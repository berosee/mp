<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Neon Player</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
      --dark-bg: #1a1c20;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 네비게이션 */
    .nav {
      display: flex; gap: 5px; margin: 15px 0; width: 92%; max-width: 400px;
      background: rgba(255,255,255,0.05); padding: 5px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 10px 0; text-align: center; border-radius: 25px;
      font-size: 12px; font-weight: bold; transition: 0.3s;
    }
    .nav a.active {
      background: var(--deep-blue); color: #fff;
      box-shadow: 0 0 15px var(--deep-blue);
    }

    /* 플레이어 카드 (이미지 디자인 반영) */
    .player-card {
      width: 92%; max-width: 400px;
      background: #0f172a;
      border-radius: 30px; padding: 25px 20px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.3);
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
      margin-bottom: 15px;
    }

    .song-info .category { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 5px; }
    .song-info .title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

    /* 타임코드 및 비주얼라이저 중앙 배치 */
    .status-row {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; margin-bottom: 15px;
    }
    .time-display { font-size: 26px; font-family: 'Arial', sans-serif; color: #fff; }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 18px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 5px; }
    .bar.playing { animation: bounce 0.8s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 5px; } to { height: 18px; } }

    /* 진행 바 */
    .progress-container { width: 100%; cursor: pointer; padding: 10px 0; margin-bottom: 15px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; position: relative; }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

    /* 컨트롤 (재생버튼 박스 디자인 반영) */
    .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
    .btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; transition: 0.2s; }
    .btn-play { 
      font-size: 28px; color: var(--neon-blue);
      border: 2px solid #fff; border-radius: 10px;
      padding: 10px 15px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
    }

    /* 리스트 영역 */
    .playlist-wrapper { width: 92%; max-width: 400px; flex: 1; overflow-y: auto; }
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { padding: 12px 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #aaa; cursor: pointer; }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; background: rgba(0, 210, 255, 0.05); }
  </style>
</head>
<body>

<div class="nav">
  <a href="?cat=old" id="nav-old">OLD</a>
  <a href="?cat=enka" id="nav-enka">ENKA</a>
  <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
</div>

<div class="player-card">
  <div class="song-info">
    <div class="category" id="labelCat">CATEGORY</div>
    <div class="title" id="labelTitle">곡을 선택해 주세요</div>
  </div>

  <div class="status-row">
    <div class="bar-container" id="visualizer">
      <div class="bar" style="animation-delay: 0.1s"></div>
      <div class="bar" style="animation-delay: 0.3s"></div>
      <div class="bar" style="animation-delay: 0.2s"></div>
      <div class="bar" style="animation-delay: 0.4s"></div>
      <div class="bar" style="animation-delay: 0.1s"></div>
    </div>
    <div class="time-display"><span id="curTime">00</span>/<span id="durTime">00</span></div>
  </div>

  <div class="progress-container" id="progArea">
    <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="controls">
    <button class="btn" id="btnPrev">⏮</button>
    <button class="btn btn-play" id="btnPlay">▶</button>
    <button class="btn" id="btnNext">⏭</button>
  </div>
</div>

<div class="playlist-wrapper">
  <table class="playlist-table" id="listTable"></table>
</div>

<script>
// [데이터 부분은 기존과 동일]
const playlists = {
    "enka": [
        {
            "title": "이성애 - 단장의미아리고개",
            "url": "music/enka/이성애 - 단장의미아리고개.mp3"
        },
        {
            "title": "이성애 - 돌아와요부산항에",
            "url": "music/enka/이성애 - 돌아와요부산항에.mp3"
        },
        {
            "title": "이성애 - 물방아도는내력",
            "url": "music/enka/이성애 - 물방아도는내력.mp3"
        },
        {
            "title": "이성애-물방아도는내력",
            "url": "music/enka/이성애-물방아도는내력.mp3"
        },
        {
            "title": "주현미 - 스물살때 어느밤",
            "url": "music/enka/주현미 - 스물살때 어느밤.mp3"
        },
        {
            "title": "주현미 - 정말 좋았네",
            "url": "music/enka/주현미 - 정말 좋았네.mp3"
        },
        {
            "title": "주현미 - 정주지않으리",
            "url": "music/enka/주현미 - 정주지않으리.mp3"
        }
    ],
    "jazz": [
        {
            "title": "금잔디 - 고장난벽시계",
            "url": "music/jazz/금잔디 - 고장난벽시계.mp3"
        },
        {
            "title": "금잔디 - 남자라는이유로",
            "url": "music/jazz/금잔디 - 남자라는이유로.mp3"
        },
        {
            "title": "금잔디 - 네박자",
            "url": "music/jazz/금잔디 - 네박자.mp3"
        },
         {
            "title": "금잔디 - 나팔꽃 인생",
            "url": "music/jazz/금잔디 - 나팔꽃 인생.mp3"
        },
        {
            "title": "금잔디 - 안동역에서",
            "url": "music/jazz/금잔디 - 안동역에서.mp3"
        },
        {
            "title": "금잔디 - 일편단심",
            "url": "music/jazz/금잔디 - 일편단심.mp3"
        }
    ],
    "old": [
        {
            "title": "김수희 - 멍에",
            "url": "music/old/김수희 - 멍에.mp3"
        },
        {
            "title": "김용임 - 남자의 눈물",
            "url": "music/old/김용임 - 남자의 눈물.mp3"
        },
        {
            "title": "김용임 - 네 박자",
            "url": "music/old/김용임 - 네 박자.mp3"
        },
        {
            "title": "나훈아 - 녹슬은 기찻길",
            "url": "music/old/나훈아 - 녹슬은 기찻길.flac"
        },
        {
            "title": "나훈아 - 물레방아 도는데",
            "url": "music/old/나훈아 - 물레방아 도는데.flac"
        },
        {
            "title": "남진 - 빈잔",
            "url": "music/old/남진 - 빈잔.flac"
        },
        {
            "title": "이선희 - J에게",
            "url": "music/old/이선희 - J에게.mp3"
        },
        {
            "title": "장사익 - 동백아가씨",
            "url": "music/old/장사익 - 동백아가씨.mp3"
        },
        {
            "title": "장사익 - 찔레꽃",
            "url": "music/old/장사익 - 찔레꽃.mp3"
        },
        {
            "title": "최유나 - 그 겨울의 찻집",
            "url": "music/old/최유나 - 그 겨울의 찻집.mp3"
        }
    ]
}; 
// (사용자님의 실제 리스트로 채워주세요)

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];
document.getElementById("nav-" + curCat).classList.add("active");
document.getElementById("labelCat").textContent = curCat.toUpperCase();

const audio = new Audio();
let curIdx = 0;

// 시간 포맷 함수 (00:00 대신 이미지처럼 00 형식 원할 시 조정 가능)
function formatTime(sec) {
  if (isNaN(sec)) return "00";
  let m = Math.floor(sec / 60);
  let s = Math.floor(sec % 60);
  return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
}

// 이미지처럼 "분" 단위 위주로 보이고 싶을 때 (예: 01/04)
function formatSimple(sec) {
  if (isNaN(sec)) return "00";
  let m = Math.floor(sec / 60);
  let s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0'); // 단순히 분만 표시하거나, 위 formatTime을 쓰세요.
}

const listTable = document.getElementById("listTable");
curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function playSong(i) {
  curIdx = i;
  audio.src = curList[i].url;
  audio.play();
  document.getElementById("labelTitle").textContent = curList[i].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => row.classList.toggle("active", k === curIdx));
}

audio.onplay = () => {
  document.getElementById("btnPlay").textContent = "⏸";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnPlay").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.ontimeupdate = () => {
  const cur = audio.currentTime;
  const dur = audio.duration;
  if (dur) {
    document.getElementById("progFill").style.width = (cur / dur * 100) + "%";
    // 이미지의 00/00 형식 반영 (분 단위 표시 예시)
    document.getElementById("curTime").textContent = Math.floor(cur/60).toString().padStart(2,'0');
    document.getElementById("durTime").textContent = Math.floor(dur/60).toString().padStart(2,'0');
  }
};

document.getElementById("btnPlay").onclick = () => audio.paused ? audio.play() : audio.pause();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);
document.getElementById("progArea").onclick = (e) => {
  audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
};
</script>
</body>
</html>
