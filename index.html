<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mp</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 모든 요소 아담한 사이즈 고정 */
    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    .nav {
      display: flex; gap: 4px; margin: 12px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px;
      font-size: 11px; font-weight: bold;
    }
    .nav a.active {
      background: var(--deep-blue); color: #fff;
      box-shadow: 0 0 10px var(--deep-blue);
    }

    /* 플레이어 카드 - 상단 카테고리 삭제 및 높이 축소 */
    .player-card {
      background: #0f172a;
      border-radius: 20px; 
      padding: 20px 18px 15px 18px; /* 위쪽 패딩 조절 */
      text-align: center; 
      border: 1px solid rgba(0, 210, 255, 0.2);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    /* 곡 제목을 최상단으로 배치 */
    .song-info .title { 
      font-size: 16px; 
      font-weight: bold; 
      margin-bottom: 15px; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis;
      color: #fff;
    }

    /* 타임코드 및 비주얼라이저 */
    .status-row {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; margin-bottom: 15px;
    }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; color: #fff; font-weight: 300; }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    /* 진행 바 */
    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 12px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; position: relative; }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

    /* 컨트롤 버튼 */
    .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
    .btn { background: none; border: none; color: #4b5563; font-size: 20px; cursor: pointer; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 45px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
      cursor: pointer;
    }
    .btn-play-box span { color: var(--neon-blue); font-size: 24px; }

    /* 리스트 스타일 */
    .playlist-wrapper { 
      flex: 1; overflow-y: auto; 
      background: rgba(0,0,0,0.2); border-radius: 15px 15px 0 0;
    }
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 12px 18px; font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; background: rgba(0,210,255,0.05); }
  </style>
</head>
<body>

<div class="nav">
  <a href="?cat=old" id="nav-old">OLD</a>
  <a href="?cat=enka" id="nav-enka">ENKA</a>
  <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
</div>

<div class="player-card">
  <div class="song-info">
    <div class="title" id="labelTitle">곡을 선택해 주세요</div>
  </div>

  <div class="status-row">
    <div class="bar-container" id="visualizer">
      <div class="bar" style="animation-delay: 0.1s"></div>
      <div class="bar" style="animation-delay: 0.3s"></div>
      <div class="bar" style="animation-delay: 0.2s"></div>
      <div class="bar" style="animation-delay: 0.4s"></div>
    </div>
    <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
  </div>

  <div class="progress-container" id="progArea">
    <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="controls">
    <button class="btn" id="btnPrev">⏮</button>
    <div class="btn-play-box" id="btnPlayWrap">
      <span id="btnIcon">▶</span>
    </div>
    <button class="btn" id="btnNext">⏭</button>
  </div>
</div>

<div class="playlist-wrapper">
  <table class="playlist-table" id="listTable"></table>
</div>

<script>
// 데이터 예시
const playlists = {
    "enka": [
        {
            "title": "이성애 - 단장의미아리고개",
            "url": "music/enka/이성애 - 단장의미아리고개.mp3"
        },
        {
            "title": "이성애 - 돌아와요부산항에",
            "url": "music/enka/이성애 - 돌아와요부산항에.mp3"
        },
        {
            "title": "이성애 - 물방아도는내력",
            "url": "music/enka/이성애 - 물방아도는내력.mp3"
        },
        {
            "title": "이성애-물방아도는내력",
            "url": "music/enka/이성애-물방아도는내력.mp3"
        },
        {
            "title": "주현미 - 스물살때 어느밤",
            "url": "music/enka/주현미 - 스물살때 어느밤.mp3"
        },
        {
            "title": "주현미 - 정말 좋았네",
            "url": "music/enka/주현미 - 정말 좋았네.mp3"
        },
        {
            "title": "주현미 - 정주지않으리",
            "url": "music/enka/주현미 - 정주지않으리.mp3"
        }
    ],
    "jazz": [
        {
            "title": "금잔디 - 고장난벽시계",
            "url": "music/jazz/금잔디 - 고장난벽시계.mp3"
        },
        {
            "title": "금잔디 - 남자라는이유로",
            "url": "music/jazz/금잔디 - 남자라는이유로.mp3"
        },
        {
            "title": "금잔디 - 네박자",
            "url": "music/jazz/금잔디 - 네박자.mp3"
        },
         {
            "title": "금잔디 - 나팔꽃 인생",
            "url": "music/jazz/금잔디 - 나팔꽃 인생.mp3"
        },
        {
            "title": "금잔디 - 안동역에서",
            "url": "music/jazz/금잔디 - 안동역에서.mp3"
        },
        {
            "title": "금잔디 - 일편단심",
            "url": "music/jazz/금잔디 - 일편단심.mp3"
        }
    ],
    "old": [
        {
            "title": "김수희 - 멍에",
            "url": "music/old/김수희 - 멍에.mp3"
        },
        {
            "title": "김용임 - 남자의 눈물",
            "url": "music/old/김용임 - 남자의 눈물.mp3"
        },
        {
            "title": "김용임 - 네 박자",
            "url": "music/old/김용임 - 네 박자.mp3"
        },
        {
            "title": "나훈아 - 녹슬은 기찻길",
            "url": "music/old/나훈아 - 녹슬은 기찻길.flac"
        },
        {
            "title": "나훈아 - 물레방아 도는데",
            "url": "music/old/나훈아 - 물레방아 도는데.flac"
        },
        {
            "title": "남진 - 빈잔",
            "url": "music/old/남진 - 빈잔.flac"
        },
        {
            "title": "이선희 - J에게",
            "url": "music/old/이선희 - J에게.mp3"
        },
        {
            "title": "장사익 - 동백아가씨",
            "url": "music/old/장사익 - 동백아가씨.mp3"
        },
        {
            "title": "장사익 - 찔레꽃",
            "url": "music/old/장사익 - 찔레꽃.mp3"
        },
        {
            "title": "최유나 - 그 겨울의 찻집",
            "url": "music/old/최유나 - 그 겨울의 찻집.mp3"
        }
    ]
};

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");

const audio = new Audio();
let curIdx = 0;
let isLoaded = false; 

const listTable = document.getElementById("listTable");
curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

/* ... 상단 스타일 및 HTML 구조는 동일 ... */

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play().catch(e => console.log("재생 오류"));
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  
  // 모든 행에서 active 클래스 제거하고 현재 재생 곡에 추가
  rows.forEach((row, k) => {
    const isActive = (k === curIdx);
    row.classList.toggle("active", isActive);
    
    // 현재 재생 중인 곡이 리스트 뷰포트 안으로 들어오도록 스크롤
    if (isActive) {
      row.scrollIntoView({
        behavior: 'smooth',
        block: 'nearest' // 리스트가 너무 길 때 가장 가까운 위치로 스크롤
      });
    }
  });
}

/* ... 하단 이벤트 리스너 및 타임코드 로직 동일 ... */

document.getElementById("btnPlayWrap").onclick = () => {
  if (!isLoaded) { playSong(0); } 
  else { audio.paused ? audio.play() : audio.pause(); }
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    const per = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progFill").style.width = per + "%";
  }
};

audio.onloadedmetadata = () => {
  document.getElementById("durTime").textContent = formatTime(audio.duration);
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.onended = () => document.getElementById("btnNext").click();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);
document.getElementById("progArea").onclick = (e) => {
  if (audio.duration) {
    audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
  }
};
</script>
</body>
</html>
