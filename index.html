<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Final Samsung Fixed</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    /* 삼성 인터넷 전체 높이 강제 고정 */
    html, body { 
      height: 100vh; /* 브라우저 가시 영역 100% 사용 */
      margin: 0; padding: 0; 
      overflow: hidden; 
      background: #121212; 
    }

    body {
      font-family: 'Pretendard', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    /* 상단 네비게이션 */
    .nav {
      display: flex; gap: 4px; margin: 10px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
      flex-shrink: 0;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 7px 0; text-align: center; border-radius: 25px;
      font-size: 11px; font-weight: bold;
    }
    .nav a.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    /* 플레이어 카드 (슬림) */
    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 15px 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .song-info .title { 
      font-size: 16px; font-weight: bold; margin-bottom: 12px; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .status-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 8px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 42px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* [핵심 수정] 리스트 영역 높이 확보 */
    .playlist-wrapper { 
      flex: 1; /* 남은 화면 전체 사용 */
      overflow-y: auto; 
      background: rgba(0,0,0,0.3); 
      border-radius: 15px 15px 0 0;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 50px; /* 하단 여백 최적화 */
      box-sizing: border-box;
      min-height: 0; /* flex 자식의 높이 버그 방지 */
    }
    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 12px 18px; /* 곡당 높이를 약 42px로 설정하여 12곡 이상 노출 유도 */
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0, 210, 255, 0.1); 
    }
  </style>
</head>
<body>

<div class="nav">
  <a href="?cat=old" id="nav-old">OLD</a>
  <a href="?cat=enka" id="nav-enka">ENKA</a>
  <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
</div>

<div class="player-card">
  <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
  <div class="status-row">
    <div class="bar-container" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
  </div>
  <div class="progress-container" id="progArea">
    <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
  </div>
  <div class="controls">
    <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnPrev">⏮</button>
    <div class="btn-play-box" id="btnPlayWrap"><span id="btnIcon" style="color:var(--neon-blue);font-size:24px;">▶</span></div>
    <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnNext">⏭</button>

<div class="playlist-wrapper" id="scrollContainer">

const audio = new Audio();
let curIdx = 0;
let isLoaded = false;
const scrollContainer = document.getElementById("scrollContainer");

// 리스트 출력 및 초기 설정
function init() {
  const listTable = document.getElementById("listTable");
  curList.forEach((song, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${song.title}</td>`;
    tr.onclick = () => playSong(i);
    listTable.appendChild(tr);
  });
}

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play();
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

// 스크롤 및 UI 업데이트 (가장 확실한 좌표 이동 방식)
function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => {
    if (k === curIdx) {
      row.classList.add("active");
      // 삼성 인터넷 대응용 강제 스크롤 로직
      setTimeout(() => {
        const rowTop = row.offsetTop;
        const rowHeight = row.offsetHeight;
        const containerHeight = scrollContainer.clientHeight;
        const targetPos = rowTop - (containerHeight / 2) + (rowHeight / 2);
        
        scrollContainer.scrollTo({
          top: targetPos,
          behavior: 'smooth'
        });
      }, 100);
    } else {
      row.classList.remove("active");
    }
  });
}

// 타임코드 포맷 및 버튼 이벤트 등 (기존 로직 동일)
