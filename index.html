<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Samsung Slim Edition</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    /* 화면 전체 높이 고정 및 스크롤 방지 */
    html, body { 
      height: 100%; 
      margin: 0; padding: 0; 
      overflow: hidden; 
      background: #121212; 
    }

    body {
      font-family: 'Pretendard', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 모든 요소 가로폭 고정 */
    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    /* 상단 네비게이션 */
    .nav {
      display: flex; gap: 4px; margin: 12px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
      flex-shrink: 0;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px;
      font-size: 11px; font-weight: bold;
    }
    .nav a.active { background: var(--deep-blue); color: #fff; box-shadow: 0 0 10px var(--deep-blue); }

    /* 플레이어 카드 (슬림형) */
    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .song-info .title { 
      font-size: 16px; font-weight: bold; margin-bottom: 15px; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .status-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 12px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 45px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* [삼성 인터넷 최적화] 리스트 영역 */
    .playlist-wrapper { 
      flex: 1; 
      overflow-y: auto; 
      background: rgba(0,0,0,0.25); 
      border-radius: 15px 15px 0 0;
      -webkit-overflow-scrolling: touch;
      /* 하단 여백 추가: 삼성 인터넷 하단 바 공간 확보 */
      padding-bottom: 80px; 
      box-sizing: border-box;
    }
    
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 14px 18px; 
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0, 210, 255, 0.1); 
    }
  </style>
</head>
<body>

<div class="nav">
  <a href="?cat=old" id="nav-old">OLD</a>
  <a href="?cat=enka" id="nav-enka">ENKA</a>
  <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
</div>

<div class="player-card">
  <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
  <div class="status-row">
    <div class="bar-container" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
  </div>
  <div class="progress-container" id="progArea">
    <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
  </div>
  <div class="controls">
    <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnPrev">⏮</button>
    <div class="btn-play-box" id="btnPlayWrap"><span id="btnIcon" style="color:var(--neon-blue);font-size:24px;">▶</span></div>
    <button style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;" id="btnNext">⏭</button>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <table class="playlist-table" id="listTable"></table>
</div>

<script>
// 데이터 설정 (기존 리스트 그대로 사용)
const playlists = {
    "enka": [
        {
            "title": "이성애 - 단장의미아리고개",
            "url": "music/enka/이성애 - 단장의미아리고개.mp3"
        },
        {
            "title": "이성애 - 돌아와요부산항에",
            "url": "music/enka/이성애 - 돌아와요부산항에.mp3"
        },
        {
            "title": "이성애 - 물방아도는내력",
            "url": "music/enka/이성애 - 물방아도는내력.mp3"
        },
        {
            "title": "이성애-물방아도는내력",
            "url": "music/enka/이성애-물방아도는내력.mp3"
        },
        {
            "title": "주현미 - 스물살때 어느밤",
            "url": "music/enka/주현미 - 스물살때 어느밤.mp3"
        },
        {
            "title": "주현미 - 정말 좋았네",
            "url": "music/enka/주현미 - 정말 좋았네.mp3"
        },
        {
            "title": "주현미 - 정주지않으리",
            "url": "music/enka/주현미 - 정주지않으리.mp3"
        }
    ],
    "jazz": [
        {
            "title": "금잔디 - 고장난벽시계",
            "url": "music/jazz/금잔디 - 고장난벽시계.mp3"
        },
        {
            "title": "금잔디 - 남자라는이유로",
            "url": "music/jazz/금잔디 - 남자라는이유로.mp3"
        },
        {
            "title": "금잔디 - 네박자",
            "url": "music/jazz/금잔디 - 네박자.mp3"
        },
         {
            "title": "금잔디 - 나팔꽃 인생",
            "url": "music/jazz/금잔디 - 나팔꽃 인생.mp3"
        },
        {
            "title": "금잔디 - 안동역에서",
            "url": "music/jazz/금잔디 - 안동역에서.mp3"
        },
        {
            "title": "금잔디 - 일편단심",
            "url": "music/jazz/금잔디 - 일편단심.mp3"
        }
    ],
    "old": [
        {
            "title": "김수희 - 멍에",
            "url": "music/old/김수희 - 멍에.mp3"
        },
        {
            "title": "김용임 - 남자의 눈물",
            "url": "music/old/김용임 - 남자의 눈물.mp3"
        },
        {
            "title": "김용임 - 네 박자",
            "url": "music/old/김용임 - 네 박자.mp3"
        },
        {
            "title": "나훈아 - 녹슬은 기찻길",
            "url": "music/old/나훈아 - 녹슬은 기찻길.flac"
        },
        {
            "title": "김용임 - 남자의 눈물",
            "url": "music/old/김용임 - 남자의 눈물.mp3"
        },
        {
            "title": "김용임 - 네 박자",
            "url": "music/old/김용임 - 네 박자.mp3"
        },
        {
            "title": "나훈아 - 녹슬은 기찻길",
            "url": "music/old/나훈아 - 녹슬은 기찻길.flac"
        },
        {
            "title": "나훈아 - 물레방아 도는데",
            "url": "music/old/나훈아 - 물레방아 도는데.flac"
        },
        {
            "title": "남진 - 빈잔",
            "url": "music/old/남진 - 빈잔.flac"
        },
        {
            "title": "이선희 - J에게",
            "url": "music/old/이선희 - J에게.mp3"
        },
        {
            "title": "장사익 - 동백아가씨",
            "url": "music/old/장사익 - 동백아가씨.mp3"
        },
        {
            "title": "장사익 - 찔레꽃",
            "url": "music/old/장사익 - 찔레꽃.mp3"
        },
        {
            "title": "최유나 - 그 겨울의 찻집",
            "url": "music/old/최유나 - 그 겨울의 찻집.mp3"
        }
    ]
};
const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");

const audio = new Audio();
let curIdx = 0;
let isLoaded = false;

const listTable = document.getElementById("listTable");
const scrollContainer = document.getElementById("scrollContainer");

curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play();
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

// 직접 좌표 계산 방식의 정밀 스크롤
function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => {
    if (k === curIdx) {
      row.classList.add("active");
      
      setTimeout(() => {
        const rowTop = row.offsetTop;
        const rowHeight = row.offsetHeight;
        const containerHeight = scrollContainer.offsetHeight;
        
        // 재생 중인 곡을 리스트 영역의 중앙으로 스크롤
        const scrollTarget = rowTop - (containerHeight / 2) + (rowHeight / 2);
        
        scrollContainer.scrollTo({
          top: scrollTarget,
          behavior: 'smooth'
        });
      }, 50); 
    } else {
      row.classList.remove("active");
    }
  });
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

document.getElementById("btnPlayWrap").onclick = () => {
  if (!isLoaded) playSong(0);
  else audio.paused ? audio.play() : audio.pause();
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    document.getElementById("progFill").style.width = (audio.currentTime / audio.duration * 100) + "%";
  }
};

audio.onloadedmetadata = () => {
  document.getElementById("durTime").textContent = formatTime(audio.duration);
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.onended = () => document.getElementById("btnNext").click();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);

document.getElementById("progArea").onclick = (e) => {
  if (audio.duration) {
    audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
  }
};
</script>
</body>
</html>
