<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simple Music Player - No Album</title>
  <style>
    :root { --neon-blue: #00d2ff; --deep-blue: #4a7cff; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #121212; color: #fff; }
    body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; }

    .fixed-header { width: 100%; display: flex; flex-direction: column; align-items: center; background: #121212; z-index: 100; padding-bottom: 10px; flex-shrink: 0; border-bottom: 1px solid #222; }
    .nav, .player-card { width: 92%; max-width: 380px; }

    /* 네비게이션 버튼 디자인 */
   /* 1. 카테고리 영역 전체 폭 조절 (더 콤팩트하게) */
.nav { 
    display: flex; 
    gap: 8px; 
    margin: 15px auto; 
    background: rgba(255, 255, 255, 0.02); /* 아주 은은한 배경 */
    padding: 5px 15px; /* 좌우 여백을 주어 버튼이 가운데로 모이게 함 */
    border-radius: 50px; 
    width: fit-content; /* 내용물 크기에 딱 맞게 줄임 */
    min-width: 220px;   /* 너무 작아지지 않게 최소폭 유지 */
}

/* 2. 버튼 기본 상태 (더 어둡고 차분하게) */
.nav button { 
    flex: none; /* 고정 폭을 가지도록 변경 */
    width: 65px; /* 버튼의 좌우 폭을 줄임 */
    border: none; 
    background: #0a0a0a; /* 매우 어두운 배경색 */
    color: #444; /* 폰트도 어둡게 하여 중요도를 낮춤 */
    padding: 6px 0; 
    border-radius: 20px; 
    font-size: 10px; /* 폰트 크기 축소 */
    font-weight: 500; 
    cursor: pointer; 
    transition: all 0.4s ease;
    border: 1px solid rgba(255, 255, 255, 0.03); /* 아주 미세한 테두리 */
}

/* 3. 버튼 활성화 상태 (파란색 대비 강조) */
.nav button.active { 
    background: #003366 !important; /* 깊고 어두운 파란색 배경 */
    color: var(--neon-blue) !important; /* 글자만 밝은 파란색으로 대비 증가 */
    box-shadow: 0 0 12px rgba(0, 210, 255, 0.4); /* 은은한 네온 광채 */
    border: 1px solid var(--neon-blue); /* 테두리로 선택 표시 */
    transform: translateY(-1px); /* 살짝 들리는 느낌 */
}

    .player-card { background: #0f172a; border-radius: 15px; padding: 15px 20px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.15); }
    .song-info .title { font-size: 17px; font-weight: bold; margin-bottom: 15px; color: var(--neon-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .time-display { font-size: 13px; font-family: 'Consolas', monospace; color: #888; }
    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 14px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; transition: 0.2s; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 14px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 12px; }
    .progress-bg { height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); border-radius: 2px; transition: width 0.1s linear; }

    .controls { display: flex; justify-content: center; align-items: center; gap: 35px; }
    .btn-play-box { border: 1.5px solid var(--neon-blue); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    .playlist-wrapper { width: 100%; flex: 1; overflow-y: auto; background: #161b22; }
    .playlist-table { width: 100%; max-width: 420px; margin: 0 auto; border-collapse: collapse; }
    .playlist-table td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #94a3b8; cursor: pointer; }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; background: rgba(0, 210, 255, 0.08); }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="nav">
    <button onclick="loadCategory('old')" id="nav-old">OLD</button>
    <button onclick="loadCategory('enka')" id="nav-enka">ENKA</button>
    <button onclick="loadCategory('jazz')" id="nav-jazz">JAZZ</button>
  </div>

  <div class="player-card">
    <div class="song-info"><div class="title" id="labelTitle">곡을 선택해 주세요</div></div>
    <div class="status-row">
      <div class="bar-container" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
    </div>
    <div class="progress-container" id="progArea" onclick="seek(event)">
      <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="controls">
      <button style="background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;" onclick="prevSong()">⏮</button>
      <div class="btn-play-box" id="btnPlayWrap" onclick="togglePlay()"><span id="btnIcon" style="color:var(--neon-blue);font-size:22px;">▶</span></div>
      <button style="background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;" onclick="nextSong()">⏭</button>
    </div>
  </div>
</div>

<div class="playlist-wrapper">
  <table class="playlist-table">
    <tbody id="playlistBody"></tbody>
  </table>
</div>

<script>
// 사용자 정보 설정
const user = "berosee";
const repo = "mp";
let songs = [];
let names = [];
let index = 0;

const player = new Audio(); // 오디오 엔진 생성

// [핵심] 리스트를 불러오고 버튼의 불을 켜는 통합 함수
async function loadCategory(folder) {
    // 1. 모든 버튼에서 파란 불 지우기
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    // 2. 현재 선택된 버튼만 파란 불 켜기
    const activeBtn = document.getElementById("nav-" + folder);
    if(activeBtn) activeBtn.classList.add('active');

    // 3. GitHub에서 노래 목록 가져오기
    const api = `https://api.github.com/repos/${user}/${repo}/contents/${folder}`;
    try {
        const res = await fetch(api);
        const data = await res.json();
        
        songs = []; 
        names = [];
        let html = '';

        data.forEach(file => {
            const fileName = file.name.toLowerCase();
            // 확장자 확인
            if(fileName.endsWith(".mp3") || fileName.endsWith(".flac")) {
                const url = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/${file.name}`;
                songs.push(url);
                names.push(file.name);
                // 리스트 한 줄씩 생성
                html += `<tr onclick="playSong(${songs.length-1})"><td>${file.name}</td></tr>`;
            }
        });
        // 화면에 리스트 뿌리기
        document.getElementById("playlistBody").innerHTML = html;
        
        // 브라우저 주소창 업데이트 (새로고침 시 유지용)
        window.history.pushState({}, '', `?cat=${folder}`);
        
    } catch(e) {
        console.error("노래 목록 로드 실패:", e);
        document.getElementById("playlistBody").innerHTML = '<tr><td>노래를 불러오지 못했습니다.</td></tr>';
    }
}

// 노래 재생 함수
function playSong(i) {
    index = i;
    player.src = songs[index];
    player.play();
    document.getElementById("labelTitle").textContent = names[index];
    updateUI();
}

// 재생/일시정지 토글
function togglePlay() {
    if (!player.src) { if(songs.length > 0) playSong(0); return; }
    player.paused ? player.play() : player.pause();
}

// 현재 재생중인 곡 표시
function updateUI() {
    const rows = document.querySelectorAll("#playlistBody tr");
    rows.forEach((row, k) => {
        row.classList.toggle("active", k === index);
        if (k === index) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
}

// 이전/다음 곡
function nextSong() { if(songs.length > 0) { index = (index + 1) % songs.length; playSong(index); } }
function prevSong() { if(songs.length > 0) { index = (index - 1 + songs.length) % songs.length; playSong(index); } }

// 재생 바 클릭 시 이동
function seek(e) {
    if(!player.duration) return;
    const rect = document.getElementById("progArea").getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    player.currentTime = pos * player.duration;
}

// 오디오 이벤트 리스너
player.addEventListener("play", () => {
    document.getElementById("btnIcon").textContent = "Ⅱ";
    document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
});
player.addEventListener("pause", () => {
    document.getElementById("btnIcon").textContent = "▶";
    document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
});
player.ontimeupdate = () => {
    if (player.duration) {
        const cur = player.currentTime;
        const dur = player.duration;
        document.getElementById("curTime").textContent = formatTime(cur);
        document.getElementById("durTime").textContent = formatTime(dur);
        document.getElementById("progFill").style.width = (cur / dur * 100) + "%";
    }
};
player.addEventListener("ended", nextSong);

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

// 처음 접속 시 실행할 카테고리 결정
const params = new URLSearchParams(window.location.search);
const startCat = params.get("cat") || "old";
loadCategory(startCat);
</script>
</body>
</html>
