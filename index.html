<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* 네비게이션 - 아담한 사이즈 */
    .nav {
      display: flex; gap: 4px; margin: 10px 0; width: 92%; max-width: 360px;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 7px 0; text-align: center; border-radius: 25px;
      font-size: 11px; font-weight: bold;
    }
    .nav a.active {
      background: var(--deep-blue); color: #fff;
      box-shadow: 0 0 10px var(--deep-blue);
    }

    /* 플레이어 카드 - 작고 아담한 사이즈 */
    .player-card {
      width: 90%; max-width: 360px;
      background: #0f172a;
      border-radius: 20px; padding: 15px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
      margin-bottom: 10px;
    }

    .song-info .category { font-size: 9px; color: var(--neon-blue); letter-spacing: 1px; margin-bottom: 3px; }
    .song-info .title { font-size: 15px; font-weight: bold; margin-bottom: 10px; min-height: 18px; }

    /* 타임코드 및 비주얼라이저 */
    .status-row {
      display: flex; justify-content: center; align-items: center;
      gap: 10px; margin-bottom: 12px;
    }
    .time-display { font-size: 22px; font-family: sans-serif; color: #fff; letter-spacing: 1px; }

    .bar-container { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 14px; } }

    /* 진행 바 */
    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 10px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); }

    /* 컨트롤 - 이미지의 사각형 박스 스타일 */
    .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn { background: none; border: none; color: #4a7cff; font-size: 18px; cursor: pointer; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 8px;
      padding: 6px 12px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
    }
    .btn-play-box span { color: #00d2ff; font-size: 20px; }

    /* 리스트 영역 - 종전 사이즈 및 스타일 */
    .playlist-wrapper { 
      width: 92%; max-width: 360px; flex: 1; 
      background: rgba(255,255,255,0.03);
      border-radius: 15px 15px 0 0; overflow-y: auto; 
    }
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 10px 15px; font-size: 13.5px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #ccc; cursor: pointer; 
    }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; }
  </style>
</head>
<body>

<div class="nav">
  <a href="?cat=old" id="nav-old">OLD</a>
  <a href="?cat=enka" id="nav-enka">ENKA</a>
  <a href="?cat=jazz" id="nav-jazz">JAZZ</a>
</div>

<div class="player-card">
  <div class="song-info">
    <div class="category" id="labelCat">CATEGORY</div>
    <div class="title" id="labelTitle">곡을 선택해 주세요</div>
  </div>

  <div class="status-row">
    <div class="bar-container" id="visualizer">
      <div class="bar" style="animation-delay: 0.1s"></div>
      <div class="bar" style="animation-delay: 0.3s"></div>
      <div class="bar" style="animation-delay: 0.2s"></div>
      <div class="bar" style="animation-delay: 0.4s"></div>
    </div>
    <div class="time-display"><span id="curTime">00</span>/<span id="durTime">00</span></div>
  </div>

  <div class="progress-container" id="progArea">
    <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="controls">
    <button class="btn" id="btnPrev">⏮</button>
    <div class="btn-play-box" id="btnPlayWrap" style="cursor:pointer">
      <span id="btnIcon">▶</span>
    </div>
    <button class="btn" id="btnNext">⏭</button>
  </div>
</div>

<div class="playlist-wrapper">
  <table class="playlist-table" id="listTable"></table>
</div>

<script>
const playlists = {
    "enka": [
        {
            "title": "이성애 - 단장의미아리고개",
            "url": "music/enka/이성애 - 단장의미아리고개.mp3"
        },
        {
            "title": "이성애 - 돌아와요부산항에",
            "url": "music/enka/이성애 - 돌아와요부산항에.mp3"
        },
        {
            "title": "이성애 - 물방아도는내력",
            "url": "music/enka/이성애 - 물방아도는내력.mp3"
        },
        {
            "title": "이성애-물방아도는내력",
            "url": "music/enka/이성애-물방아도는내력.mp3"
        },
        {
            "title": "주현미 - 스물살때 어느밤",
            "url": "music/enka/주현미 - 스물살때 어느밤.mp3"
        },
        {
            "title": "주현미 - 정말 좋았네",
            "url": "music/enka/주현미 - 정말 좋았네.mp3"
        },
        {
            "title": "주현미 - 정주지않으리",
            "url": "music/enka/주현미 - 정주지않으리.mp3"
        }
    ],
    "jazz": [
        {
            "title": "금잔디 - 고장난벽시계",
            "url": "music/jazz/금잔디 - 고장난벽시계.mp3"
        },
        {
            "title": "금잔디 - 남자라는이유로",
            "url": "music/jazz/금잔디 - 남자라는이유로.mp3"
        },
        {
            "title": "금잔디 - 네박자",
            "url": "music/jazz/금잔디 - 네박자.mp3"
        },
         {
            "title": "금잔디 - 나팔꽃 인생",
            "url": "music/jazz/금잔디 - 나팔꽃 인생.mp3"
        },
        {
            "title": "금잔디 - 안동역에서",
            "url": "music/jazz/금잔디 - 안동역에서.mp3"
        },
        {
            "title": "금잔디 - 일편단심",
            "url": "music/jazz/금잔디 - 일편단심.mp3"
        }
    ],
    "old": [
        {
            "title": "김수희 - 멍에",
            "url": "music/old/김수희 - 멍에.mp3"
        },
        {
            "title": "김용임 - 남자의 눈물",
            "url": "music/old/김용임 - 남자의 눈물.mp3"
        },
        {
            "title": "김용임 - 네 박자",
            "url": "music/old/김용임 - 네 박자.mp3"
        },
        {
            "title": "나훈아 - 녹슬은 기찻길",
            "url": "music/old/나훈아 - 녹슬은 기찻길.flac"
        },
        {
            "title": "나훈아 - 물레방아 도는데",
            "url": "music/old/나훈아 - 물레방아 도는데.flac"
        },
        {
            "title": "남진 - 빈잔",
            "url": "music/old/남진 - 빈잔.flac"
        },
        {
            "title": "이선희 - J에게",
            "url": "music/old/이선희 - J에게.mp3"
        },
        {
            "title": "장사익 - 동백아가씨",
            "url": "music/old/장사익 - 동백아가씨.mp3"
        },
        {
            "title": "장사익 - 찔레꽃",
            "url": "music/old/장사익 - 찔레꽃.mp3"
        },
        {
            "title": "최유나 - 그 겨울의 찻집",
            "url": "music/old/최유나 - 그 겨울의 찻집.mp3"
        }
    ]
};

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];
document.getElementById("nav-" + curCat).classList.add("active");
document.getElementById("labelCat").textContent = curCat.toUpperCase();

const audio = new Audio();
let curIdx = 0;

const listTable = document.getElementById("listTable");
curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function playSong(i) {
  curIdx = i;
  audio.src = curList[i].url;
  audio.load(); // 오디오 로드 강제 실행
  audio.play().catch(e => console.log("Play error"));
  document.getElementById("labelTitle").textContent = curList[i].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => row.classList.toggle("active", k === curIdx));
}

// 시간 업데이트 로직 수정 (이미지의 00/03 형식)
audio.ontimeupdate = () => {
  if (audio.duration) {
    const curMin = Math.floor(audio.currentTime / 60);
    const durMin = Math.floor(audio.duration / 60);
    
    // 분 단위로 표시 (이미지 디자인 기준)
    document.getElementById("curTime").textContent = curMin.toString().padStart(2, '0');
    document.getElementById("durTime").textContent = durMin.toString().padStart(2, '0');
    
    // 진행바 업데이트
    const per = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progFill").style.width = per + "%";
  }
};

// 메타데이터 로드 시 총 시간 즉시 표시
audio.onloadedmetadata = () => {
  const durMin = Math.floor(audio.duration / 60);
  document.getElementById("durTime").textContent = durMin.toString().padStart(2, '0');
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

document.getElementById("btnPlayWrap").onclick = () => audio.paused ? audio.play() : audio.pause();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);
document.getElementById("progArea").onclick = (e) => {
  audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
};
</script>
</body>
</html>
